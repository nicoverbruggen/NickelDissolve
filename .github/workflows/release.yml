name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: NickelDissolve
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pgaskin/nickeltc:1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0        # full history so `git describe` stamps the tag as the version
          submodules: true

      - name: Build
        run: make clean all strip koboroot

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: NickelDissolve
          path: |
            KoboRoot.tgz
            src/libnickeldissolve.so

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: NickelDissolve

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v tag="$GITHUB_REF_NAME" '
            $0 == "## " tag { found = 1; next }
            found && /^## /  { exit }
            found            { print }
          ' CHANGELOG.md > release-notes.md

          # The CHANGELOG is the authoritative source for release notes: refuse to
          # publish a release whose section is missing or empty.
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error file=CHANGELOG.md::No '## $GITHUB_REF_NAME' section found in CHANGELOG.md — add one before tagging."
            exit 1
          fi

          {
            echo
            echo "---"
            echo
            echo "**Install:** copy \`KoboRoot.tgz\` to the Kobo's hidden \`.kobo\` folder, eject, and reboot. Settings are in \`KOBOeReader/.adds/nickel-dissolve/config\`; see the [README](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_REF_NAME/README.md)."
            echo
            echo "**Uninstall:** delete \`KOBOeReader/.adds/nickel-dissolve/uninstall\` and reboot."
          } >> release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: NickelDissolve ${{ github.ref_name }}
          body_path: release-notes.md
          files: KoboRoot.tgz
